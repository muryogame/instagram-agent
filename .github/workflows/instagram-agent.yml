name: Instagram 自律収益化エージェント

on:
  schedule:
    # JST = UTC+9 のためUTC時刻で指定
    - cron: '0 23 * * *'   # JST 08:00 - 朝のインサイト投稿
    - cron: '0 3 * * *'    # JST 12:00 - 昼のTips投稿
    - cron: '0 9 * * *'    # JST 18:00 - 夕方の深掘り投稿
    - cron: '0 12 * * *'   # JST 21:00 - 夜の導線投稿
  workflow_dispatch:
    inputs:
      post_type:
        description: '投稿タイプ (educational/empathy/sales_funnel)'
        required: false
        default: 'educational'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: x_agent/requirements.txt

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: 日本語フォントインストール
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fonts-noto-cjk

      - name: dataディレクトリ作成
        run: mkdir -p data/images logs

      - name: 投稿タイプを判定
        id: determine_type
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "${{ github.event.inputs.post_type }}" != "" ]; then
            echo "post_type=${{ github.event.inputs.post_type }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "08" ]; then
            echo "post_type=morning_insight" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "12" ]; then
            echo "post_type=tips" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ]; then
            echo "post_type=deep_carousel" >> $GITHUB_OUTPUT
          else
            echo "post_type=sales_funnel" >> $GITHUB_OUTPUT
          fi

      - name: エージェント実行
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTE_PROFILE_URL: ${{ secrets.NOTE_PROFILE_URL }}
          AFFILIATE_URL: ${{ secrets.AFFILIATE_URL }}
          LINE_URL: ${{ secrets.LINE_URL }}
          LINKTREE_URL: ${{ secrets.LINKTREE_URL }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN: 'false'
        run: python main.py run-now ${{ steps.determine_type.outputs.post_type }}

      - name: エンゲージメント更新（夜21時のみ）
        if: contains(github.event.schedule, '0 12')
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: 'false'
        run: python main.py update-metrics

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_number }}
          path: |
            agent_history.log
            data/latest_insight.json
            data/performance_analysis.json
          retention-days: 30
